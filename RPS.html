<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>

<body>
    <h4>Rock Paper Scissors</h4>
    <button onclick="
        playGame('Rock');
        ">Rock</button>

    <button onclick="
        playGame('Paper');
        ">Paper</button>

    <button onclick="
        playGame('Scissors');
    ">Scissors</button>

    <button onclick="
        score.wins=0;
        score.looses=0;
        score.tie=0;
        localStorage.removeItem('score')
    ">Reset Score</button>

    <script>
        let score=JSON.parse(localStorage.getItem('score')) || {
                wins:0,
                looses:0,
                tie:0
            };

        // if(!score){
        //     score={
        //         wins:0,
        //         looses:0,
        //         tie:0
        //     };
        // }

        function playGame(playerMove) {
            const computerMove = pickComputerMove();
            let result = '';
            if (playerMove === 'Rock') {
                if (computerMove === 'Rock') {
                    result = 'Tie';
                }
                else if (computerMove === 'Paper') {
                    result = 'You Loose';
                }
                else result = 'You Win';
            } else if (playerMove === 'Paper') {
                if (computerMove === 'Rock') {
                    result = 'You win';
                }
                else if (computerMove === 'Paper') {
                    result = 'Tie';
                }
                else result = 'You loose';
            } else {
                if (computerMove === 'Rock') {
                    result = 'You loose';
                }
                else if (computerMove === 'Paper') {
                    result = 'You win';
                }
                else result = 'Tie';
            }

            if(result==='You win'){
                score.wins+=1;
            }
            else if(result==='You loose'){
                score.looses+=1;
            }
            else if(result==='Tie'){
                score.tie+=1;
            }    
            localStorage.setItem('score',JSON.stringify(score));

            alert(`You picked ${playerMove}.Computer picked ${computerMove}.${result}
            wins:${score.wins},looses:${score.looses},tie:${score.tie}`);
        }

        function pickComputerMove() {
            const randomNumber = Math.random();
            let computerMove = '';
            if (randomNumber >= 0 && randomNumber < 1 / 3) {
                computerMove = 'Rock';
            }
            else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
                computerMove = 'Paper';
            }
            else {
                computerMove = 'Scissors';
            }
            return computerMove;
        }
    </script>
</body>

</html>
