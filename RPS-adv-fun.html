<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <style>
        body {
            background-color: rgb(25, 25, 25);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }

        .title {
            font-size: 30px;
            font-weight: bold;
        }

        .move-icon {
            height: 50px;
        }

        .move-button {
            background-color: transparent;
            border: 3px solid white;
            width: 120px;
            height: 120px;
            border-radius: 60px;
            margin-right: 10px;
            cursor: pointer;
        }

        .result {
            font-size: 25px;
            font-weight: bold;
            margin-top: 50px;
        }

        .score {
            margin-top: 50px;
        }

        .reset-score-button,
        .auto-play-button {
            background-color: white;
            border: none;
            font-size: 15px;
            padding: 8px 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <p class="title">Rock Paper Scissors</p>
    <button onclick="
        playGame('Rock');
        " class="move-button"><img src="images/rock-emoji.png" alt="" class="move-icon"></button>

    <button onclick="
        playGame('Paper');
        " class="move-button"><img src="images/paper-emoji.png" alt="" class="move-icon"></button>

    <button onclick="
        playGame('Scissors');
    " class="move-button"><img src="images/scissors-emoji.png" alt="" class="move-icon"></button>

    <p class="js-result result"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>

    <button onclick="
        score.wins=0;
        score.looses=0;
        score.tie=0;
        localStorage.removeItem('score');
        updateScore();
    " class="reset-score-button">Reset Score</button>

    <button class="auto-play-button" onclick="
        autoPlay();
    ">Auto Play</button>

    <script>
        let score = JSON.parse(localStorage.getItem('score')) || {
            wins: 0,
            looses: 0,
            tie: 0
        };

        updateScore();

        // if(!score){
        //     score={
        //         wins:0,
        //         looses:0,
        //         tie:0
        //     };
        // }

        let isAutoPlaying=false;
        let intervalId;

        function autoPlay() {
            if(!isAutoPlaying){
                intervalId = setInterval(function () {
                    const playerMove = pickComputerMove();
                    playGame(playerMove)
                }, 1000);
                isAutoPlaying=true;
            }else{
                clearInterval(intervalId);
                isAutoPlaying=false;
            }
        }

        function playGame(playerMove) {
            const computerMove = pickComputerMove();
            let result = '';
            if (playerMove === 'Rock') {
                if (computerMove === 'Rock') {
                    result = 'Tie';
                }
                else if (computerMove === 'Paper') {
                    result = 'You loose';
                }
                else result = 'You win';
            } else if (playerMove === 'Paper') {
                if (computerMove === 'Rock') {
                    result = 'You win';
                }
                else if (computerMove === 'Paper') {
                    result = 'Tie';
                }
                else result = 'You loose';
            } else {
                if (computerMove === 'Rock') {
                    result = 'You loose';
                }
                else if (computerMove === 'Paper') {
                    result = 'You win';
                }
                else result = 'Tie';
            }

            if (result === 'You win') {
                score.wins += 1;
            }
            else if (result === 'You loose') {
                score.looses += 1;
            }
            else if (result === 'Tie') {
                score.tie += 1;
            }
            localStorage.setItem('score', JSON.stringify(score));

            updateScore();
            document.querySelector('.js-result').innerHTML = result;
            document.querySelector('.js-moves').innerHTML = `You
        <img src="images/${playerMove}-emoji.png" alt="" class="move-icon">
        <img src="images/${computerMove}-emoji.png" alt="" class="move-icon">
        Computer`;

            // alert(`You picked ${playerMove}.Computer picked ${computerMove}.${result}
            // wins:${score.wins},looses:${score.looses},tie:${score.tie}`);
        }

        function updateScore() {
            document.querySelector('.js-score').innerHTML = `wins:${score.wins},looses:${score.looses},tie:${score.tie}`;
        }

        function pickComputerMove() {
            const randomNumber = Math.random();
            let computerMove = '';
            if (randomNumber >= 0 && randomNumber < 1 / 3) {
                computerMove = 'Rock';
            }
            else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
                computerMove = 'Paper';
            }
            else {
                computerMove = 'Scissors';
            }
            return computerMove;
        }
    </script>
</body>

</html>
