<!DOCTYPE html>

<head>
    <title>To-Do-List</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        .todo-grid,
        .todo-input-grid{
            display: grid;
            grid-template-columns: 200px 150px 100px;
            column-gap: 10px;
            row-gap: 10px;
            align-items: center;
        }
        .todo-input-grid{
            margin-bottom: 10px;
            align-items: stretch;
        }
        .name-input,
        .due-date-input{
            font-size: 15px;
            padding: 6px;
        }
        .add-todo-button{
            color: white;
            background-color: green;
            border: none;
            font-size: 15px;
            cursor: pointer;
        }
        .delete-todo-button{
            color: white;
            background-color: darkred;
            border: none;
            font-size: 15px;
            cursor: pointer;
            padding-top: 10px;
            padding-bottom: 10px;
        }
    </style>
</head>

<body>
    <p>To Do List</p>

    <div class="todo-input-grid">
        <input placeholder="Todo name" class="js-name-input name-input" onkeydown="handlekd(event);">
        <input type="date" class="js-due-date-input due-date-input">
        <button class="add-todo-button js-add-todo-button">Add</button>
    </div>

    <div class="js-todo-list todo-grid"></div>

    <script>
        const TodoList = [];

        function handlekd() {
            if (event.key === 'Enter') {
                addTodo();
            }
        }
        renderTodoList();

        function renderTodoList() {
            let TodoListHTML = '';

            TodoList.forEach((todoObject,index)=>{
                const { name,dueDate }=todoObject;
                const html = `
                <div>${name}</div>
                <div>${dueDate}</div>
                <button onclick="
                    TodoList.splice(${index},1);
                    renderTodoList();
                " class="delete-todo-button js-delete-todo-button">Delete</button>
                `;
                TodoListHTML += html;
            });
            /*
            for (let i = 0; i < TodoList.length; i++) {
                const todoObject = TodoList[i];
                // const name=todoObject.name;
                // const dueDate=todoObject.dueDate;
                const { name,dueDate }=todoObject;
                const html = `
                <div>${name}</div>
                <div>${dueDate}</div>
                <button onclick="
                    TodoList.splice(${i},1);
                    renderTodoList();
                " class="delete-todo-button">Delete</button>
                `;
                TodoListHTML += html;
            }
            */
            document.querySelector('.js-todo-list').innerHTML = TodoListHTML;
            document.querySelectorAll('.js-delete-todo-button')
                .forEach((deleteButton,index)=>{
                    deleteButton.addEventListener('click',()=>{
                        TodoList.splice(index,1);
                    renderTodoList();
                    });
                });
        }

        document.querySelector('.js-add-todo-button').addEventListener('click',()=>{
            addTodo();
        });
        document.querySelector('.js-delete-todo-button').addEventListener('click',()=>{
            addTodo();
        });

        function addTodo() {
            const inputElement = document.querySelector('.js-name-input')
            const name = inputElement.value;
            const dateInputElement = document.querySelector('.js-due-date-input')
            const dueDate = dateInputElement.value;

            TodoList.push({
                // name:name,
                // dueDate:dueDate
                name,
                dueDate
            });
            console.log(TodoList);
            inputElement.value = '';
            renderTodoList();
        }
    </script>
</body>

</html>
